name: CI

on:
  pull_request:
  push:
    branches: [main, refactor/nuxt]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Preparar tipos de Nuxt
        run: pnpm nuxi prepare

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests unitarios
        run: pnpm test

      - name: Build de prueba (datos de fixture, sin Supabase)
        run: pnpm generate:fixture
